<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screen</title>

  <!-- Google Fonts Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Playfair+Display:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS v3 CDN (compatible with html2canvas) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Iconify Icons -->
  <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>

  <!-- No pre-cached icons -->

  <script>
    // Tailwind v3 configuration with custom theme colors
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: 'rgb(var(--background) / <alpha-value>)',
            foreground: 'rgb(var(--foreground) / <alpha-value>)',
            card: {
              DEFAULT: 'rgb(var(--card) / <alpha-value>)',
              foreground: 'rgb(var(--card-foreground) / <alpha-value>)',
            },
            popover: {
              DEFAULT: 'rgb(var(--popover) / <alpha-value>)',
              foreground: 'rgb(var(--popover-foreground) / <alpha-value>)',
            },
            primary: {
              DEFAULT: 'rgb(var(--primary) / <alpha-value>)',
              foreground: 'rgb(var(--primary-foreground) / <alpha-value>)',
            },
            secondary: {
              DEFAULT: 'rgb(var(--secondary) / <alpha-value>)',
              foreground: 'rgb(var(--secondary-foreground) / <alpha-value>)',
            },
            muted: {
              DEFAULT: 'rgb(var(--muted) / <alpha-value>)',
              foreground: 'rgb(var(--muted-foreground) / <alpha-value>)',
            },
            accent: {
              DEFAULT: 'rgb(var(--accent) / <alpha-value>)',
              foreground: 'rgb(var(--accent-foreground) / <alpha-value>)',
            },
            destructive: {
              DEFAULT: 'rgb(var(--destructive) / <alpha-value>)',
              foreground: 'rgb(var(--destructive-foreground) / <alpha-value>)',
            },
            border: 'rgb(var(--border) / <alpha-value>)',
            input: 'rgb(var(--input) / <alpha-value>)',
            ring: 'rgb(var(--ring) / <alpha-value>)',
            chart: {
              1: 'var(--chart-1)',
              2: 'var(--chart-2)',
              3: 'var(--chart-3)',
              4: 'var(--chart-4)',
              5: 'var(--chart-5)',
            },
          },
          fontFamily: {
            sans: ['var(--font-sans)', 'system-ui', 'sans-serif'],
            heading: ['var(--font-heading)', 'system-ui', 'sans-serif'],
            serif: ['var(--font-serif)', 'Georgia', 'serif'],
            mono: ['var(--font-mono)', 'monospace'],
          },
          borderRadius: {
            sm: 'calc(var(--radius) - 4px)',
            md: 'calc(var(--radius) - 2px)',
            lg: 'var(--radius)',
            xl: 'calc(var(--radius) + 4px)',
            '2xl': 'calc(var(--radius) + 8px)',
            '3xl': 'calc(var(--radius) + 12px)',
          },
        },
      },
    }
  </script>

  <style>
    /* CSS Custom Properties - Theme Values */
    :root {
      --background: 11 15 31;
      --foreground: 244 245 251;

      --card: 22 27 51;
      --card-foreground: 244 245 251;

      --popover: 22 27 51;
      --popover-foreground: 244 245 251;

      --primary: 124 111 240;
      --primary-foreground: 244 245 251;

      --secondary: 31 37 71;
      --secondary-foreground: 154 160 192;

      --muted: 31 37 71;
      --muted-foreground: 92 99 136;

      --accent: 127 227 196;
      --accent-foreground: 11 15 31;

      --destructive: 255 107 107;
      --destructive-foreground: 255 255 255;

      --border: 38 44 72;
      --input: 38 44 72;
      --ring: 124 111 240;

      --radius: 1rem;

      --chart-1: #7C6FF0;
      --chart-2: #8B7BFF;
      --chart-3: #9AA8FF;
      --chart-4: #7FE3C4;
      --chart-5: #A48BFF;

      --font-sans: "Inter", system-ui, sans-serif;
      --font-heading: "Plus Jakarta Sans", system-ui, sans-serif;
      --font-serif: "Playfair Display", Georgia, serif;
      --font-mono: "JetBrains Mono", monospace;
    }

    /* Apply base font */
    body {
      font-family: var(--font-sans);
      background-color: rgb(var(--background));
      color: rgb(var(--foreground));
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Hide scrollbars globally (both vertical and horizontal) */
    * {
      scrollbar-width: none; /* Firefox */
      -ms-overflow-style: none; /* IE and Edge */
    }
    *::-webkit-scrollbar {
      display: none; /* Chrome, Safari, Opera */
    }

    /* Safe area utilities for mobile */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
    .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
    .pl-safe { padding-left: env(safe-area-inset-left, 0px); }
    .pr-safe { padding-right: env(safe-area-inset-right, 0px); }

    /* Hide scrollbar but allow scrolling */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Smooth transitions for interactive elements */
    button, a, [role="button"] {
      transition: all 0.15s ease;
    }

    /* Better image rendering */
    img {
      image-rendering: -webkit-optimize-contrast;
    }
  </style>
</head>
<body>
  <div class="h-screen w-full bg-background flex flex-col relative overflow-hidden font-sans text-foreground select-none">
    
    <!-- Background Star Particles Layer -->
    <div class="absolute inset-0 z-0 pointer-events-none">
        <div class="absolute top-[12%] left-[15%] w-[3px] h-[3px] bg-white/40 rounded-full blur-[0.5px]"></div>
        <div class="absolute top-[18%] right-[20%] w-[4px] h-[4px] bg-primary/40 rounded-full blur-[1px]"></div>
        <div class="absolute top-[30%] left-[75%] w-[2px] h-[2px] bg-white/20 rounded-full"></div>
        <div class="absolute top-[8%] left-[55%] w-[5px] h-[5px] bg-accent/20 rounded-full blur-[1.5px]"></div>
        <div class="absolute bottom-[45%] left-[25%] w-[4px] h-[4px] bg-primary/30 rounded-full blur-[1px]"></div>
        <div class="absolute bottom-[35%] right-[10%] w-[3px] h-[3px] bg-white/30 rounded-full blur-[0.5px]"></div>
        <div class="absolute top-[48%] left-[8%] w-[2px] h-[2px] bg-white/20 rounded-full"></div>
        <div class="absolute top-[65%] right-[15%] w-[4px] h-[4px] bg-accent/30 rounded-full blur-[1px]"></div>
        
        <!-- Large Ambient Glows -->
        <div class="absolute -top-[10%] -left-[10%] w-[70%] h-[40%] bg-primary/10 rounded-full blur-[120px]"></div>
        <div class="absolute top-[40%] -right-[10%] w-[50%] h-[40%] bg-accent/5 rounded-full blur-[100px]"></div>
    </div>

    <!-- Header / Status Area -->
    <div class="relative z-20 px-6 pt-14 pb-4 flex justify-between items-center w-full">
        <div>
            <span class="text-muted-foreground text-[14px] font-medium tracking-wide uppercase block mb-1">Welcome Hero</span>
            <h2 class="text-[24px] font-bold text-foreground leading-tight">Your Dashboard</h2>
        </div>
        <div class="w-11 h-11 rounded-2xl bg-secondary flex items-center justify-center border border-border/40">
            <iconify-icon icon="lucide:bell" width="22" height="22" class="text-foreground/80"></iconify-icon>
        </div>
    </div>

    <!-- Main Content Area: Empty State Centerpiece -->
    <div class="flex-1 flex flex-col items-center justify-center px-8 relative z-10 w-full mb-[10vh]">
        <!-- Hero Icon with Halo -->
        <div class="relative flex items-center justify-center w-[180px] h-[180px] mb-8">
            <!-- 40px, 20% opacity lavender gradient glow -->
            <div class="absolute inset-0 bg-primary/20 blur-[50px] rounded-full scale-100"></div>
            <!-- Core Icon -->
            <div class="relative z-10 text-primary drop-shadow-[0_0_20px_rgba(124,111,240,0.4)]">
                <iconify-icon icon="lucide:bed" width="100" height="100"></iconify-icon>
            </div>
            <!-- Floating accent icon -->
            <div class="absolute -top-2 -right-2 z-10 text-accent opacity-90 drop-shadow-[0_0_10px_rgba(127,227,196,0.4)]">
                <iconify-icon icon="lucide:sparkle" width="36" height="36"></iconify-icon>
            </div>
        </div>

        <!-- Typography -->
        <h1 class="font-heading text-[28px] font-bold text-foreground text-center mb-4 tracking-tight">
            A New Beginning
        </h1>
        <p class="text-muted-foreground text-center text-[16px] leading-[1.6] max-w-[280px]">
            Log your first night to unlock deep sleep insights and personalized recovery metrics.
        </p>

        <!-- Secondary CTA Text -->
        <div class="mt-8 flex items-center gap-2 px-6 py-2 bg-secondary/50 rounded-full border border-border/30">
            <iconify-icon icon="lucide:info" width="16" height="16" class="text-primary"></iconify-icon>
            <span class="text-[13px] text-secondary-foreground font-medium">Takes only 30 seconds</span>
        </div>
    </div>

    <!-- Bottom Actions Area (Fixed positioning for thumb zone) -->
    <div class="absolute bottom-0 left-0 w-full h-[24vh] px-8 pb-10 pt-4 flex flex-col items-center justify-end bg-gradient-to-t from-background via-background to-transparent z-20">
        
        <!-- Gradient Action Button -->
        <div class="w-full relative">
            <!-- Subtle button shadow/glow -->
            <div class="absolute -inset-1 bg-primary/30 blur-[12px] rounded-[28px] pointer-events-none"></div>
            <button class="relative w-full h-[64px] bg-gradient-to-r from-primary to-[#8C82F2] text-primary-foreground rounded-[28px] font-semibold text-[18px] tracking-wide flex items-center justify-center shadow-lg active:scale-[0.98]">
                <iconify-icon icon="lucide:plus-circle" class="mr-2.5" width="22" height="22"></iconify-icon>
                Log Sleep Session
            </button>
        </div>

        <!-- Mock Home Indicator -->
        <div class="mt-8 w-32 h-[5px] bg-white/10 rounded-full"></div>
    </div>
    
</div>
</body>
</html>
