<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screen</title>

  <!-- Google Fonts Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Playfair+Display:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS v3 CDN (compatible with html2canvas) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Iconify Icons -->
  <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>

  <!-- No pre-cached icons -->

  <script>
    // Tailwind v3 configuration with custom theme colors
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: 'rgb(var(--background) / <alpha-value>)',
            foreground: 'rgb(var(--foreground) / <alpha-value>)',
            card: {
              DEFAULT: 'rgb(var(--card) / <alpha-value>)',
              foreground: 'rgb(var(--card-foreground) / <alpha-value>)',
            },
            popover: {
              DEFAULT: 'rgb(var(--popover) / <alpha-value>)',
              foreground: 'rgb(var(--popover-foreground) / <alpha-value>)',
            },
            primary: {
              DEFAULT: 'rgb(var(--primary) / <alpha-value>)',
              foreground: 'rgb(var(--primary-foreground) / <alpha-value>)',
            },
            secondary: {
              DEFAULT: 'rgb(var(--secondary) / <alpha-value>)',
              foreground: 'rgb(var(--secondary-foreground) / <alpha-value>)',
            },
            muted: {
              DEFAULT: 'rgb(var(--muted) / <alpha-value>)',
              foreground: 'rgb(var(--muted-foreground) / <alpha-value>)',
            },
            accent: {
              DEFAULT: 'rgb(var(--accent) / <alpha-value>)',
              foreground: 'rgb(var(--accent-foreground) / <alpha-value>)',
            },
            destructive: {
              DEFAULT: 'rgb(var(--destructive) / <alpha-value>)',
              foreground: 'rgb(var(--destructive-foreground) / <alpha-value>)',
            },
            border: 'rgb(var(--border) / <alpha-value>)',
            input: 'rgb(var(--input) / <alpha-value>)',
            ring: 'rgb(var(--ring) / <alpha-value>)',
            chart: {
              1: 'var(--chart-1)',
              2: 'var(--chart-2)',
              3: 'var(--chart-3)',
              4: 'var(--chart-4)',
              5: 'var(--chart-5)',
            },
          },
          fontFamily: {
            sans: ['var(--font-sans)', 'system-ui', 'sans-serif'],
            heading: ['var(--font-heading)', 'system-ui', 'sans-serif'],
            serif: ['var(--font-serif)', 'Georgia', 'serif'],
            mono: ['var(--font-mono)', 'monospace'],
          },
          borderRadius: {
            sm: 'calc(var(--radius) - 4px)',
            md: 'calc(var(--radius) - 2px)',
            lg: 'var(--radius)',
            xl: 'calc(var(--radius) + 4px)',
            '2xl': 'calc(var(--radius) + 8px)',
            '3xl': 'calc(var(--radius) + 12px)',
          },
        },
      },
    }
  </script>

  <style>
    /* CSS Custom Properties - Theme Values */
    :root {
      --background: 11 15 31;
      --foreground: 244 245 251;

      --card: 22 27 51;
      --card-foreground: 244 245 251;

      --popover: 22 27 51;
      --popover-foreground: 244 245 251;

      --primary: 124 111 240;
      --primary-foreground: 244 245 251;

      --secondary: 31 37 71;
      --secondary-foreground: 154 160 192;

      --muted: 31 37 71;
      --muted-foreground: 92 99 136;

      --accent: 127 227 196;
      --accent-foreground: 11 15 31;

      --destructive: 255 107 107;
      --destructive-foreground: 255 255 255;

      --border: 38 44 72;
      --input: 38 44 72;
      --ring: 124 111 240;

      --radius: 1rem;

      --chart-1: #7C6FF0;
      --chart-2: #8B7BFF;
      --chart-3: #9AA8FF;
      --chart-4: #7FE3C4;
      --chart-5: #A48BFF;

      --font-sans: "Inter", system-ui, sans-serif;
      --font-heading: "Plus Jakarta Sans", system-ui, sans-serif;
      --font-serif: "Playfair Display", Georgia, serif;
      --font-mono: "JetBrains Mono", monospace;
    }

    /* Apply base font */
    body {
      font-family: var(--font-sans);
      background-color: rgb(var(--background));
      color: rgb(var(--foreground));
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Hide scrollbars globally (both vertical and horizontal) */
    * {
      scrollbar-width: none; /* Firefox */
      -ms-overflow-style: none; /* IE and Edge */
    }
    *::-webkit-scrollbar {
      display: none; /* Chrome, Safari, Opera */
    }

    /* Safe area utilities for mobile */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
    .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
    .pl-safe { padding-left: env(safe-area-inset-left, 0px); }
    .pr-safe { padding-right: env(safe-area-inset-right, 0px); }

    /* Hide scrollbar but allow scrolling */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Smooth transitions for interactive elements */
    button, a, [role="button"] {
      transition: all 0.15s ease;
    }

    /* Better image rendering */
    img {
      image-rendering: -webkit-optimize-contrast;
    }
  </style>
</head>
<body>
  <div class="h-screen w-full bg-background flex flex-col relative overflow-hidden font-sans text-foreground select-none">
    
    <!-- Background Star Particles Layer -->
    <div class="absolute inset-0 z-0 pointer-events-none">
        <div class="absolute top-[12%] left-[15%] w-[3px] h-[3px] bg-white/40 rounded-full blur-[0.5px]"></div>
        <div class="absolute top-[25%] right-[20%] w-[4px] h-[4px] bg-primary/40 rounded-full blur-[1px]"></div>
        <div class="absolute top-[45%] left-[75%] w-[2px] h-[2px] bg-white/20 rounded-full"></div>
        <div class="absolute top-[8%] left-[55%] w-[5px] h-[5px] bg-accent/20 rounded-full blur-[1.5px]"></div>
        <div class="absolute bottom-[35%] left-[15%] w-[4px] h-[4px] bg-primary/30 rounded-full blur-[1px]"></div>
        <div class="absolute bottom-[25%] right-[10%] w-[3px] h-[3px] bg-white/30 rounded-full blur-[0.5px]"></div>
        
        <!-- Ambient glow behind the form -->
        <div class="absolute top-[50%] left-[50%] -translate-x-1/2 -translate-y-1/2 w-[90%] h-[40%] bg-primary/5 rounded-full blur-[100px]"></div>
    </div>

    <!-- Header / Privacy Tray -->
    <div class="relative z-10 pt-14 px-6 mb-8">
        <div class="flex items-center justify-center gap-2 bg-secondary/50 border border-border/30 rounded-full py-2.5 px-5 mx-auto w-fit">
            <iconify-icon icon="lucide:user-plus" class="text-primary" width="16" height="16"></iconify-icon>
            <span class="text-xs font-medium text-text-muted-foreground tracking-wide uppercase">Join 10k+ users sleeping better</span>
        </div>
    </div>

    <!-- Main Content Area (Form) -->
    <div class="flex-1 flex flex-col px-8 relative z-10 w-full overflow-y-auto no-scrollbar">
        <!-- Brand Identity -->
        <div class="flex flex-col items-center mb-10">
            <div class="relative flex items-center justify-center w-[100px] h-[100px] mb-6">
                <div class="absolute inset-0 bg-primary/20 blur-[30px] rounded-full"></div>
                <div class="relative z-10 text-primary drop-shadow-[0_0_10px_rgba(124,111,240,0.4)]">
                    <iconify-icon icon="lucide:sparkles" width="56" height="56"></iconify-icon>
                </div>
            </div>
            <h1 class="font-heading text-[32px] font-bold text-foreground text-center mb-2 tracking-tight">
                Create Account
            </h1>
            <p class="text-muted-foreground text-center text-[16px]">
                Start your journey to better rest
            </p>
        </div>

        <!-- Input Fields -->
        <div class="space-y-4">
            <div class="group">
                <div class="bg-secondary/80 focus-within:bg-secondary border border-border/20 focus-within:border-primary/40 rounded-[20px] px-6 h-[64px] flex items-center gap-4 transition-all">
                    <iconify-icon icon="lucide:mail" class="text-muted-foreground" width="20" height="20"></iconify-icon>
                    <input type="email" placeholder="Email Address" class="bg-transparent border-none outline-none w-full text-foreground placeholder:text-muted-foreground/60 text-[16px]">
                </div>
            </div>
            <div class="group">
                <div class="bg-secondary/80 focus-within:bg-secondary border border-border/20 focus-within:border-primary/40 rounded-[20px] px-6 h-[64px] flex items-center gap-4 transition-all">
                    <iconify-icon icon="lucide:key-round" class="text-muted-foreground" width="20" height="20"></iconify-icon>
                    <input type="password" placeholder="Create Password" class="bg-transparent border-none outline-none w-full text-foreground placeholder:text-muted-foreground/60 text-[16px]">
                    <iconify-icon icon="lucide:eye-off" class="text-muted-foreground/40" width="20" height="20"></iconify-icon>
                </div>
            </div>
            
            <div class="px-2">
                <p class="text-[12px] text-muted-foreground leading-relaxed">
                    By signing up, you agree to our <span class="text-primary font-medium">Terms of Service</span> and <span class="text-primary font-medium">Privacy Policy</span>.
                </p>
            </div>
        </div>

        <!-- Action Area -->
        <div class="mt-8 space-y-4">
            <!-- Create Button -->
            <div class="relative w-full">
                <div class="absolute -inset-1 bg-primary/20 blur-[12px] rounded-[28px] pointer-events-none"></div>
                <button class="relative w-full h-[64px] bg-gradient-to-r from-primary to-primary/80 text-foreground rounded-[28px] font-semibold text-[18px] tracking-wide flex items-center justify-center shadow-lg active:scale-[0.98] transition-all">
                    Get Started
                    <iconify-icon icon="lucide:arrow-right" class="ml-2 mt-[1px]" width="20" height="20"></iconify-icon>
                </button>
            </div>

            <div class="flex items-center gap-4 py-2">
                <div class="h-[1px] flex-1 bg-border/30"></div>
                <span class="text-muted-foreground text-[14px] uppercase tracking-widest font-medium">or</span>
                <div class="h-[1px] flex-1 bg-border/30"></div>
            </div>

            <!-- Social Button -->
            <button class="w-full h-[64px] bg-transparent border border-border/50 text-foreground rounded-[28px] font-medium text-[16px] flex items-center justify-center gap-3 active:bg-secondary/50 transition-all">
                <iconify-icon icon="lucide:chrome" width="20" height="20" class="text-primary"></iconify-icon>
                Sign up with Google
            </button>
        </div>
    </div>

    <!-- Bottom Actions Area -->
    <div class="relative z-20 px-8 pb-10 pt-4 bg-gradient-to-t from-background via-background to-transparent flex flex-col items-center">
        <p class="text-muted-foreground text-[15px]">
            Already have an account? 
            <button class="text-primary font-bold ml-1">Sign In</button>
        </p>
    </div>

    <!-- Navigation Bar - Main Screen Density -->
    <div class="relative z-30 h-[92px] bg-card/95 backdrop-blur-xl border-t border-border flex items-center justify-around px-4 pb-6">
        <div class="flex flex-col items-center gap-1 opacity-40">
            <iconify-icon icon="lucide:home" width="24" height="24"></iconify-icon>
            <span class="text-[10px] uppercase tracking-tighter font-medium">Home</span>
        </div>
        <div class="flex flex-col items-center gap-1 opacity-40">
            <iconify-icon icon="lucide:moon" width="24" height="24"></iconify-icon>
            <span class="text-[10px] uppercase tracking-tighter font-medium">Log</span>
        </div>
        <div class="flex flex-col items-center gap-1 opacity-40">
            <iconify-icon icon="lucide:bar-chart-3" width="24" height="24"></iconify-icon>
            <span class="text-[10px] uppercase tracking-tighter font-medium">Stats</span>
        </div>
        <div class="flex flex-col items-center gap-1 opacity-40">
            <iconify-icon icon="lucide:brain-circuit" width="24" height="24"></iconify-icon>
            <span class="text-[10px] uppercase tracking-tighter font-medium">Coach</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-primary">
            <iconify-icon icon="lucide:user" width="24" height="24"></iconify-icon>
            <span class="text-[10px] uppercase tracking-tighter font-medium">Profile</span>
        </div>
    </div>
    
</div>
</body>
</html>
