<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screen</title>

  <!-- Google Fonts Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Playfair+Display:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS v3 CDN (compatible with html2canvas) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Iconify Icons -->
  <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>

  <!-- No pre-cached icons -->

  <script>
    // Tailwind v3 configuration with custom theme colors
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: 'rgb(var(--background) / <alpha-value>)',
            foreground: 'rgb(var(--foreground) / <alpha-value>)',
            card: {
              DEFAULT: 'rgb(var(--card) / <alpha-value>)',
              foreground: 'rgb(var(--card-foreground) / <alpha-value>)',
            },
            popover: {
              DEFAULT: 'rgb(var(--popover) / <alpha-value>)',
              foreground: 'rgb(var(--popover-foreground) / <alpha-value>)',
            },
            primary: {
              DEFAULT: 'rgb(var(--primary) / <alpha-value>)',
              foreground: 'rgb(var(--primary-foreground) / <alpha-value>)',
            },
            secondary: {
              DEFAULT: 'rgb(var(--secondary) / <alpha-value>)',
              foreground: 'rgb(var(--secondary-foreground) / <alpha-value>)',
            },
            muted: {
              DEFAULT: 'rgb(var(--muted) / <alpha-value>)',
              foreground: 'rgb(var(--muted-foreground) / <alpha-value>)',
            },
            accent: {
              DEFAULT: 'rgb(var(--accent) / <alpha-value>)',
              foreground: 'rgb(var(--accent-foreground) / <alpha-value>)',
            },
            destructive: {
              DEFAULT: 'rgb(var(--destructive) / <alpha-value>)',
              foreground: 'rgb(var(--destructive-foreground) / <alpha-value>)',
            },
            border: 'rgb(var(--border) / <alpha-value>)',
            input: 'rgb(var(--input) / <alpha-value>)',
            ring: 'rgb(var(--ring) / <alpha-value>)',
            chart: {
              1: 'var(--chart-1)',
              2: 'var(--chart-2)',
              3: 'var(--chart-3)',
              4: 'var(--chart-4)',
              5: 'var(--chart-5)',
            },
          },
          fontFamily: {
            sans: ['var(--font-sans)', 'system-ui', 'sans-serif'],
            heading: ['var(--font-heading)', 'system-ui', 'sans-serif'],
            serif: ['var(--font-serif)', 'Georgia', 'serif'],
            mono: ['var(--font-mono)', 'monospace'],
          },
          borderRadius: {
            sm: 'calc(var(--radius) - 4px)',
            md: 'calc(var(--radius) - 2px)',
            lg: 'var(--radius)',
            xl: 'calc(var(--radius) + 4px)',
            '2xl': 'calc(var(--radius) + 8px)',
            '3xl': 'calc(var(--radius) + 12px)',
          },
        },
      },
    }
  </script>

  <style>
    /* CSS Custom Properties - Theme Values */
    :root {
      --background: 11 15 31;
      --foreground: 244 245 251;

      --card: 22 27 51;
      --card-foreground: 244 245 251;

      --popover: 22 27 51;
      --popover-foreground: 244 245 251;

      --primary: 124 111 240;
      --primary-foreground: 244 245 251;

      --secondary: 31 37 71;
      --secondary-foreground: 154 160 192;

      --muted: 31 37 71;
      --muted-foreground: 92 99 136;

      --accent: 127 227 196;
      --accent-foreground: 11 15 31;

      --destructive: 255 107 107;
      --destructive-foreground: 255 255 255;

      --border: 38 44 72;
      --input: 38 44 72;
      --ring: 124 111 240;

      --radius: 1rem;

      --chart-1: #7C6FF0;
      --chart-2: #8B7BFF;
      --chart-3: #9AA8FF;
      --chart-4: #7FE3C4;
      --chart-5: #A48BFF;

      --font-sans: "Inter", system-ui, sans-serif;
      --font-heading: "Plus Jakarta Sans", system-ui, sans-serif;
      --font-serif: "Playfair Display", Georgia, serif;
      --font-mono: "JetBrains Mono", monospace;
    }

    /* Apply base font */
    body {
      font-family: var(--font-sans);
      background-color: rgb(var(--background));
      color: rgb(var(--foreground));
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Hide scrollbars globally (both vertical and horizontal) */
    * {
      scrollbar-width: none; /* Firefox */
      -ms-overflow-style: none; /* IE and Edge */
    }
    *::-webkit-scrollbar {
      display: none; /* Chrome, Safari, Opera */
    }

    /* Safe area utilities for mobile */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
    .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
    .pl-safe { padding-left: env(safe-area-inset-left, 0px); }
    .pr-safe { padding-right: env(safe-area-inset-right, 0px); }

    /* Hide scrollbar but allow scrolling */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Smooth transitions for interactive elements */
    button, a, [role="button"] {
      transition: all 0.15s ease;
    }

    /* Better image rendering */
    img {
      image-rendering: -webkit-optimize-contrast;
    }
  </style>
</head>
<body>
  <div class="flex flex-col h-screen bg-background overflow-hidden font-sans text-foreground select-none relative">
    
    <!-- Background Star Particles Layer -->
    <div class="absolute inset-0 z-0 pointer-events-none">
        <div class="absolute top-[10%] left-[15%] w-[3px] h-[3px] bg-white/40 rounded-full blur-[0.5px]"></div>
        <div class="absolute top-[15%] right-[20%] w-[4px] h-[4px] bg-primary/40 rounded-full blur-[1px]"></div>
        <div class="absolute top-[40%] left-[85%] w-[2px] h-[2px] bg-white/20 rounded-full"></div>
        <div class="absolute top-[5%] left-[55%] w-[5px] h-[5px] bg-accent/20 rounded-full blur-[1.5px]"></div>
        <div class="absolute bottom-[35%] left-[15%] w-[4px] h-[4px] bg-primary/30 rounded-full blur-[1px]"></div>
        <div class="absolute bottom-[25%] right-[10%] w-[3px] h-[3px] bg-white/30 rounded-full blur-[0.5px]"></div>
        
        <!-- Ambient Glow -->
        <div class="absolute -top-[10%] -right-[10%] w-[70%] h-[40%] bg-primary/5 rounded-full blur-[100px]"></div>
    </div>

    <!-- Header Section -->
    <div class="relative z-10 px-6 pt-14 pb-4">
        <div class="flex items-center justify-between">
            <div class="flex flex-col">
                <span class="text-muted-foreground text-sm font-medium tracking-wide uppercase">Tonight's Log</span>
                <h1 class="text-2xl font-bold font-heading mt-1">Activity</h1>
            </div>
            <div class="p-3 bg-secondary rounded-2xl border border-border/40">
                <iconify-icon icon="lucide:calendar" width="24" height="24" class="text-primary"></iconify-icon>
            </div>
        </div>
    </div>

    <!-- Scrollable Content -->
    <div class="flex-1 overflow-y-auto no-scrollbar relative z-10 px-6 pb-32">
        
        <!-- Sleep Time Selection Card -->
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-card border border-border/50 p-5 rounded-[28px] flex flex-col items-center gap-3">
                <iconify-icon icon="lucide:bed" width="20" height="20" class="text-muted-foreground"></iconify-icon>
                <div class="text-center">
                    <p class="text-xs text-muted-foreground mb-1">Bedtime</p>
                    <p class="text-xl font-bold">10:45 PM</p>
                </div>
            </div>
            <div class="bg-card border border-border/50 p-5 rounded-[28px] flex flex-col items-center gap-3">
                <iconify-icon icon="lucide:alarm-clock" width="20" height="20" class="text-muted-foreground"></iconify-icon>
                <div class="text-center">
                    <p class="text-xs text-muted-foreground mb-1">Wake up</p>
                    <p class="text-xl font-bold">07:30 AM</p>
                </div>
            </div>
        </div>

        <!-- Progress/Quality Slider -->
        <div class="bg-card border border-border/50 p-6 rounded-[28px] mb-8 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-24 h-24 bg-primary/5 blur-3xl"></div>
            <h3 class="text-lg font-semibold mb-6 flex items-center gap-2">
                Sleep Quality
                <span class="text-primary text-sm font-normal bg-primary/10 px-2 py-0.5 rounded-full">Fair</span>
            </h3>
            
            <div class="relative py-4">
                <div class="h-2 w-full bg-secondary rounded-full overflow-hidden">
                    <div class="h-full w-[65%] bg-gradient-to-r from-primary to-accent rounded-full relative">
                        <div class="absolute right-0 top-1/2 -translate-y-1/2 w-6 h-6 bg-foreground rounded-full shadow-lg border-4 border-primary"></div>
                    </div>
                </div>
                <div class="flex justify-between mt-4 text-[11px] text-muted-foreground font-medium uppercase tracking-tighter">
                    <span>Restless</span>
                    <span>Peaceful</span>
                </div>
            </div>
        </div>

        <!-- Activity Tags -->
        <div class="mb-4">
            <h3 class="text-lg font-semibold mb-4 text-foreground">Pre-sleep Activities</h3>
            <div class="flex flex-wrap gap-3">
                <div class="bg-primary/20 border border-primary/30 px-5 py-3 rounded-[24px] text-primary flex items-center gap-2 transition-all">
                    <iconify-icon icon="lucide:coffee" width="18" height="18"></iconify-icon>
                    <span class="text-[14px] font-medium">Caffeine</span>
                </div>
                <div class="bg-secondary border border-border/40 px-5 py-3 rounded-[24px] text-foreground flex items-center gap-2">
                    <iconify-icon icon="lucide:book-open" width="18" height="18"></iconify-icon>
                    <span class="text-[14px] font-medium">Reading</span>
                </div>
                <div class="bg-secondary border border-border/40 px-5 py-3 rounded-[24px] text-foreground flex items-center gap-2">
                    <iconify-icon icon="lucide:tv" width="18" height="18"></iconify-icon>
                    <span class="text-[14px] font-medium">Screen Time</span>
                </div>
                <div class="bg-primary/20 border border-primary/30 px-5 py-3 rounded-[24px] text-primary flex items-center gap-2">
                    <iconify-icon icon="lucide:dumbbell" width="18" height="18"></iconify-icon>
                    <span class="text-[14px] font-medium">Exercise</span>
                </div>
                <div class="bg-secondary border border-border/40 px-5 py-3 rounded-[24px] text-foreground flex items-center gap-2">
                    <iconify-icon icon="lucide:wind" width="18" height="18"></iconify-icon>
                    <span class="text-[14px] font-medium">Meditation</span>
                </div>
                <button class="bg-secondary/40 border-2 border-dashed border-border/40 px-5 py-3 rounded-[24px] text-muted-foreground flex items-center gap-2">
                    <iconify-icon icon="lucide:plus" width="18" height="18"></iconify-icon>
                    <span class="text-[14px] font-medium">Add tag</span>
                </button>
            </div>
        </div>
        
        <!-- Log Action -->
        <div class="mt-8 relative group">
            <div class="absolute -inset-0.5 bg-primary/20 blur-[10px] rounded-[28px] pointer-events-none"></div>
            <button class="relative w-full h-[64px] bg-gradient-to-r from-primary to-primary/80 text-primary-foreground rounded-[28px] font-semibold text-[18px] tracking-wide flex items-center justify-center shadow-lg active:opacity-95">
                Save Sleep Entry
                <iconify-icon icon="lucide:check" class="ml-2" width="22" height="22"></iconify-icon>
            </button>
        </div>
    </div>

    <!-- Bottom Navigation (Floating Style) -->
    <div class="fixed bottom-6 left-6 right-6 z-50">
        <div class="bg-card/80 backdrop-blur-xl border border-border/40 rounded-[32px] px-2 py-2 flex items-center justify-around shadow-2xl">
            <div class="flex flex-col items-center justify-center p-3 text-primary">
                <iconify-icon icon="lucide:moon" width="24" height="24"></iconify-icon>
                <span class="text-[10px] mt-1 font-medium font-sans">Home</span>
            </div>
            <div class="flex flex-col items-center justify-center p-3 text-muted-foreground">
                <iconify-icon icon="lucide:bed-double" width="24" height="24"></iconify-icon>
                <span class="text-[10px] mt-1 font-medium font-sans">Log</span>
            </div>
            <div class="flex flex-col items-center justify-center p-3 text-muted-foreground">
                <iconify-icon icon="lucide:bar-chart-2" width="24" height="24"></iconify-icon>
                <span class="text-[10px] mt-1 font-medium font-sans">Stats</span>
            </div>
            <div class="flex flex-col items-center justify-center p-3 text-muted-foreground">
                <iconify-icon icon="lucide:sparkles" width="24" height="24"></iconify-icon>
                <span class="text-[10px] mt-1 font-medium font-sans">Coach</span>
            </div>
            <div class="flex flex-col items-center justify-center p-3 text-muted-foreground">
                <iconify-icon icon="lucide:user" width="24" height="24"></iconify-icon>
                <span class="text-[10px] mt-1 font-medium font-sans">Profile</span>
            </div>
        </div>
        <!-- Safe area padding -->
        <div class="h-2"></div>
    </div>

</div>
</body>
</html>
