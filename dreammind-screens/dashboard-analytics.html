<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screen</title>

  <!-- Google Fonts Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Playfair+Display:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS v3 CDN (compatible with html2canvas) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Iconify Icons -->
  <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>

  <!-- No pre-cached icons -->

  <script>
    // Tailwind v3 configuration with custom theme colors
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: 'rgb(var(--background) / <alpha-value>)',
            foreground: 'rgb(var(--foreground) / <alpha-value>)',
            card: {
              DEFAULT: 'rgb(var(--card) / <alpha-value>)',
              foreground: 'rgb(var(--card-foreground) / <alpha-value>)',
            },
            popover: {
              DEFAULT: 'rgb(var(--popover) / <alpha-value>)',
              foreground: 'rgb(var(--popover-foreground) / <alpha-value>)',
            },
            primary: {
              DEFAULT: 'rgb(var(--primary) / <alpha-value>)',
              foreground: 'rgb(var(--primary-foreground) / <alpha-value>)',
            },
            secondary: {
              DEFAULT: 'rgb(var(--secondary) / <alpha-value>)',
              foreground: 'rgb(var(--secondary-foreground) / <alpha-value>)',
            },
            muted: {
              DEFAULT: 'rgb(var(--muted) / <alpha-value>)',
              foreground: 'rgb(var(--muted-foreground) / <alpha-value>)',
            },
            accent: {
              DEFAULT: 'rgb(var(--accent) / <alpha-value>)',
              foreground: 'rgb(var(--accent-foreground) / <alpha-value>)',
            },
            destructive: {
              DEFAULT: 'rgb(var(--destructive) / <alpha-value>)',
              foreground: 'rgb(var(--destructive-foreground) / <alpha-value>)',
            },
            border: 'rgb(var(--border) / <alpha-value>)',
            input: 'rgb(var(--input) / <alpha-value>)',
            ring: 'rgb(var(--ring) / <alpha-value>)',
            chart: {
              1: 'var(--chart-1)',
              2: 'var(--chart-2)',
              3: 'var(--chart-3)',
              4: 'var(--chart-4)',
              5: 'var(--chart-5)',
            },
          },
          fontFamily: {
            sans: ['var(--font-sans)', 'system-ui', 'sans-serif'],
            heading: ['var(--font-heading)', 'system-ui', 'sans-serif'],
            serif: ['var(--font-serif)', 'Georgia', 'serif'],
            mono: ['var(--font-mono)', 'monospace'],
          },
          borderRadius: {
            sm: 'calc(var(--radius) - 4px)',
            md: 'calc(var(--radius) - 2px)',
            lg: 'var(--radius)',
            xl: 'calc(var(--radius) + 4px)',
            '2xl': 'calc(var(--radius) + 8px)',
            '3xl': 'calc(var(--radius) + 12px)',
          },
        },
      },
    }
  </script>

  <style>
    /* CSS Custom Properties - Theme Values */
    :root {
      --background: 11 15 31;
      --foreground: 244 245 251;

      --card: 22 27 51;
      --card-foreground: 244 245 251;

      --popover: 22 27 51;
      --popover-foreground: 244 245 251;

      --primary: 124 111 240;
      --primary-foreground: 244 245 251;

      --secondary: 31 37 71;
      --secondary-foreground: 154 160 192;

      --muted: 31 37 71;
      --muted-foreground: 92 99 136;

      --accent: 127 227 196;
      --accent-foreground: 11 15 31;

      --destructive: 255 107 107;
      --destructive-foreground: 255 255 255;

      --border: 38 44 72;
      --input: 38 44 72;
      --ring: 124 111 240;

      --radius: 1rem;

      --chart-1: #7C6FF0;
      --chart-2: #8B7BFF;
      --chart-3: #9AA8FF;
      --chart-4: #7FE3C4;
      --chart-5: #A48BFF;

      --font-sans: "Inter", system-ui, sans-serif;
      --font-heading: "Plus Jakarta Sans", system-ui, sans-serif;
      --font-serif: "Playfair Display", Georgia, serif;
      --font-mono: "JetBrains Mono", monospace;
    }

    /* Apply base font */
    body {
      font-family: var(--font-sans);
      background-color: rgb(var(--background));
      color: rgb(var(--foreground));
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Hide scrollbars globally (both vertical and horizontal) */
    * {
      scrollbar-width: none; /* Firefox */
      -ms-overflow-style: none; /* IE and Edge */
    }
    *::-webkit-scrollbar {
      display: none; /* Chrome, Safari, Opera */
    }

    /* Safe area utilities for mobile */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
    .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
    .pl-safe { padding-left: env(safe-area-inset-left, 0px); }
    .pr-safe { padding-right: env(safe-area-inset-right, 0px); }

    /* Hide scrollbar but allow scrolling */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Smooth transitions for interactive elements */
    button, a, [role="button"] {
      transition: all 0.15s ease;
    }

    /* Better image rendering */
    img {
      image-rendering: -webkit-optimize-contrast;
    }
  </style>
</head>
<body>
  <div class="flex flex-col h-screen bg-background overflow-hidden font-sans text-foreground select-none relative">
    
    <!-- Background Star Particles Layer -->
    <div class="absolute inset-0 z-0 pointer-events-none">
        <div class="absolute top-[15%] left-[10%] w-[3px] h-[3px] bg-white/40 rounded-full blur-[0.5px]"></div>
        <div class="absolute top-[30%] right-[15%] w-[4px] h-[4px] bg-primary/40 rounded-full blur-[1px]"></div>
        <div class="absolute bottom-[40%] right-[25%] w-[2px] h-[2px] bg-white/20 rounded-full"></div>
        <div class="absolute -top-[10%] -left-[10%] w-[70%] h-[40%] bg-primary/10 rounded-full blur-[80px]"></div>
    </div>

    <!-- Top Header & Toggle -->
    <div class="px-6 pt-14 pb-4 relative z-10">
        <div class="flex justify-between items-center mb-6">
            <h1 class="font-heading text-[24px] font-bold tracking-tight text-foreground">Sleep Analytics</h1>
            <div class="w-10 h-10 rounded-full bg-secondary flex items-center justify-center border border-border/50 overflow-hidden">
                <img src="https://i.pravatar.cc/150?u=99" class="w-full h-full object-cover" alt="Avatar" />
            </div>
        </div>
        
        <!-- Segmented Toggle -->
        <div class="bg-secondary/50 p-1 rounded-[16px] border border-border/30 flex items-center">
            <div class="flex-1 py-2 text-center text-[13px] font-bold text-foreground bg-card rounded-[12px] shadow-sm border border-white/5">Week</div>
            <div class="flex-1 py-2 text-center text-[13px] font-medium text-muted-foreground">Month</div>
            <div class="flex-1 py-2 text-center text-[13px] font-medium text-muted-foreground">Year</div>
        </div>
    </div>

    <!-- Scrollable Content -->
    <div class="flex-1 overflow-y-auto no-scrollbar px-6 pb-32 relative z-10">
        
        <!-- Sleep Hours Horizontal Bar Chart -->
        <div class="mt-4 relative group">
            <div class="absolute -inset-0.5 bg-primary/5 blur-[15px] rounded-[28px] pointer-events-none"></div>
            <div class="relative w-full bg-card border-t border-white/10 rounded-[28px] p-6 shadow-2xl">
                <div class="flex justify-between items-end mb-6">
                    <div>
                        <span class="text-muted-foreground text-[12px] font-medium uppercase tracking-widest">Sleep Hours</span>
                        <div class="text-[28px] font-bold tabular-nums text-foreground mt-1">7h 48m <span class="text-[14px] text-primary font-medium tracking-normal">avg</span></div>
                    </div>
                    <div class="text-right">
                        <span class="text-[12px] text-muted-foreground font-medium">Goal: 8h</span>
                    </div>
                </div>

                <!-- Horizontal Bars -->
                <div class="space-y-4 relative">
                    <!-- Target Dash Line (8h) -->
                    <div class="absolute top-0 bottom-0 left-[80%] border-l border-dashed border-foreground/20 z-0"></div>
                    
                    <div class="flex items-center gap-3">
                        <span class="w-8 text-[11px] font-bold text-muted-foreground">MON</span>
                        <div class="flex-1 h-3 bg-secondary rounded-full overflow-hidden">
                            <div class="h-full w-[75%] rounded-full bg-gradient-to-r from-[#C3B9FF] to-[#7C6FF0]" style="background: linear-gradient(135deg, #C3B9FF 0%, #7C6FF0 100%);"></div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="w-8 text-[11px] font-bold text-muted-foreground">TUE</span>
                        <div class="flex-1 h-3 bg-secondary rounded-full overflow-hidden">
                            <div class="h-full w-[85%] rounded-full" style="background: linear-gradient(135deg, #C3B9FF 0%, #7C6FF0 100%); shadow: 0 0 10px rgba(124,111,240,0.3)"></div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="w-8 text-[11px] font-bold text-muted-foreground">WED</span>
                        <div class="flex-1 h-3 bg-secondary rounded-full overflow-hidden">
                            <div class="h-full w-[60%] rounded-full" style="background: linear-gradient(135deg, #C3B9FF 0%, #7C6FF0 100%);"></div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="w-8 text-[11px] font-bold text-muted-foreground">THU</span>
                        <div class="flex-1 h-3 bg-secondary rounded-full overflow-hidden">
                            <div class="h-full w-[90%] rounded-full" style="background: linear-gradient(135deg, #C3B9FF 0%, #7C6FF0 100%);"></div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="w-8 text-[11px] font-bold text-muted-foreground">FRI</span>
                        <div class="flex-1 h-3 bg-secondary rounded-full overflow-hidden">
                            <div class="h-full w-[70%] rounded-full" style="background: linear-gradient(135deg, #C3B9FF 0%, #7C6FF0 100%);"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Middle Circular Ring Section -->
        <div class="mt-8 flex flex-col items-center justify-center p-8 bg-card border border-border/50 rounded-[28px] relative overflow-hidden">
            <div class="absolute inset-0 bg-primary/5 opacity-30"></div>
            <div class="relative flex items-center justify-center">
                <!-- SVG Ring -->
                <svg class="w-40 h-40 transform -rotate-90">
                    <circle cx="80" cy="80" r="70" stroke="currentColor" stroke-width="8" fill="transparent" class="text-secondary" />
                    <circle cx="80" cy="80" r="70" stroke="currentColor" stroke-width="8" fill="transparent" stroke-dasharray="440" stroke-dashoffset="66" stroke-linecap="round" class="text-primary" />
                </svg>
                <div class="absolute flex flex-col items-center">
                    <span class="text-[32px] font-bold text-foreground">85%</span>
                    <span class="text-[12px] text-muted-foreground uppercase font-bold tracking-widest">Quality</span>
                </div>
            </div>
            <p class="mt-6 text-[14px] text-center text-muted-foreground italic px-4">"Your sleep quality has improved by 4% compared to last week."</p>
        </div>

        <!-- Core Stats 2x2 Grid -->
        <div class="mt-8 grid grid-cols-2 gap-4">
            <div class="bg-secondary/40 border border-border/30 p-5 rounded-[24px]">
                <div class="text-[#9AA0C0] text-[12px] font-medium mb-1">Avg Bedtime</div>
                <div class="text-[#F4F5FB] text-[18px] font-bold tabular-nums">11:24 PM</div>
            </div>
            <div class="bg-secondary/40 border border-border/30 p-5 rounded-[24px]">
                <div class="text-[#9AA0C0] text-[12px] font-medium mb-1">Avg Wake Time</div>
                <div class="text-[#F4F5FB] text-[18px] font-bold tabular-nums">7:12 AM</div>
            </div>
            <div class="bg-secondary/40 border border-border/30 p-5 rounded-[24px]">
                <div class="text-[#9AA0C0] text-[12px] font-medium mb-1">Sleep Debt</div>
                <div class="text-[#F4F5FB] text-[18px] font-bold tabular-nums">-1h 15m</div>
            </div>
            <div class="bg-secondary/40 border border-border/30 p-5 rounded-[24px]">
                <div class="text-[#9AA0C0] text-[12px] font-medium mb-1">Consistency</div>
                <div class="text-[#F4F5FB] text-[18px] font-bold tabular-nums">92%</div>
            </div>
        </div>

    </div>

    <!-- Bottom Navigation (Refreshed State) -->
    <div class="fixed bottom-0 left-0 w-full px-6 pb-8 pt-4 bg-background/80 backdrop-blur-xl border-t border-border/40 z-50">
        <div class="flex justify-between items-center px-4">
            <div class="flex flex-col items-center gap-1.5 text-muted-foreground">
                <iconify-icon icon="lucide:moon" width="24" height="24"></iconify-icon>
                <span class="text-[10px] font-medium">Home</span>
            </div>
            <div class="flex flex-col items-center gap-1.5 text-muted-foreground">
                <iconify-icon icon="lucide:bed-double" width="24" height="24"></iconify-icon>
                <span class="text-[10px] font-medium">Log</span>
            </div>
            <div class="flex flex-col items-center gap-1.5 text-primary">
                <iconify-icon icon="lucide:bar-chart-2" width="24" height="24"></iconify-icon>
                <span class="text-[10px] font-bold">Stats</span>
            </div>
            <div class="flex flex-col items-center gap-1.5 text-muted-foreground">
                <iconify-icon icon="lucide:sparkles" width="24" height="24"></iconify-icon>
                <span class="text-[10px] font-medium">Coach</span>
            </div>
            <div class="flex flex-col items-center gap-1.5 text-muted-foreground">
                <iconify-icon icon="lucide:user" width="24" height="24"></iconify-icon>
                <span class="text-[10px] font-medium">Profile</span>
            </div>
        </div>
        <div class="h-2 w-full mt-4"></div>
    </div>
</div>
</body>
</html>
